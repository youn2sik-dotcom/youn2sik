<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Grok Editor">
    <meta name="theme-color" content="#0a0a0a">
    <link rel="apple-touch-icon" href="icon-192.png">
    <link rel="manifest" href="manifest.json">
    <title>Grok Image Editor</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app">
        <!-- Header -->
        <header class="header">
            <h1>Grok Image Editor</h1>
            <button id="settingsBtn" class="icon-btn" aria-label="설정">
                <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24">
                    <circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
                </svg>
            </button>
        </header>

        <!-- Main Content -->
        <main class="main">
            <!-- Source Image -->
            <section class="section">
                <label class="section-label">
                    <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="m21 15-5-5L5 21"/></svg>
                    원본 이미지
                </label>
                <div id="imagePickerArea" class="image-picker">
                    <div id="placeholderContent" class="placeholder-content">
                        <svg width="48" height="48" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M12 8v8M8 12h8"/></svg>
                        <span>이미지를 선택하려면 탭하세요</span>
                    </div>
                    <img id="previewImage" class="preview-image" alt="선택된 이미지">
                </div>
                <input type="file" id="fileInput" accept="image/*" hidden>
            </section>

            <!-- Prompt Input -->
            <section class="section">
                <label class="section-label" for="promptInput">
                    <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 1 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
                    프롬프트
                </label>
                <textarea id="promptInput" class="prompt-input" placeholder="이미지 편집 지시사항을 입력하세요" rows="3"></textarea>
            </section>

            <!-- Action Buttons -->
            <div class="action-buttons">
                <button id="editBtn" class="btn btn-edit" disabled>
                    <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M15 4V2M15 16v-2M8 9h2M20 9h2M17.8 11.8 19 13M17.8 6.2 19 5M12.2 11.8 11 13M12.2 6.2 11 5M15 12a3 3 0 1 0 0-6 3 3 0 0 0 0 6z"/></svg>
                    이미지 편집
                </button>
                <button id="generateBtn" class="btn btn-generate" disabled>
                    <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M12 3v1m0 16v1m-8-9H3m18 0h-1M5.6 5.6l.7.7m12.1-.7-.7.7M5.6 18.4l.7-.7m12.1.7-.7-.7"/><circle cx="12" cy="12" r="4"/></svg>
                    이미지 생성
                </button>
            </div>

            <!-- Result Image -->
            <section id="resultSection" class="section result-section" hidden>
                <div class="result-header">
                    <label class="section-label">
                        <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="m9 9 6 6M15 9l-6 6"/></svg>
                        결과 이미지
                    </label>
                    <button id="saveBtn" class="btn-save">
                        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                        저장
                    </button>
                </div>
                <img id="resultImage" class="result-image" alt="결과 이미지">
            </section>
        </main>

        <!-- Loading Overlay -->
        <div id="loadingOverlay" class="loading-overlay" hidden>
            <div class="loading-box">
                <div class="spinner"></div>
                <p class="loading-text">처리 중...</p>
                <p class="loading-sub">잠시만 기다려주세요</p>
            </div>
        </div>

        <!-- Settings Modal -->
        <div id="settingsModal" class="modal" hidden>
            <div class="modal-content">
                <div class="modal-header">
                    <h2>설정</h2>
                    <button id="closeSettingsBtn" class="icon-btn" aria-label="닫기">
                        <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M18 6 6 18M6 6l12 12"/></svg>
                    </button>
                </div>

                <div class="modal-body">
                    <div class="setting-group">
                        <label class="setting-label">API 키 설정</label>
                        <input type="password" id="apiKeyInput" class="setting-input" placeholder="xAI API 키를 입력하세요">
                        <button id="saveApiKeyBtn" class="btn btn-save-key">API 키 저장</button>
                    </div>

                    <div class="setting-group">
                        <label class="setting-label">API 키 발급 방법</label>
                        <ol class="instructions">
                            <li>xAI 콘솔에 접속합니다.</li>
                            <li>계정에 로그인하거나 새 계정을 만듭니다.</li>
                            <li>API Keys 메뉴에서 새 API 키를 생성합니다.</li>
                            <li>생성된 키를 복사하여 위 입력란에 붙여넣습니다.</li>
                        </ol>
                        <p class="api-link">
                            <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M2 12h20M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10A15.3 15.3 0 0 1 12 2z"/></svg>
                            <strong>console.x.ai</strong> 에서 API 키를 발급받으세요.
                        </p>
                    </div>

                    <div class="setting-group app-info">
                        <p><strong>Grok Image Editor</strong></p>
                        <p>xAI의 Grok-2 Image 모델을 사용하여 이미지를 편집하고 생성합니다.</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
