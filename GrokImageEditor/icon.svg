<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#0a0a1a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4a9eff"/>
      <stop offset="100%" style="stop-color:#a855f7"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <g transform="translate(256,256)">
    <!-- Image frame -->
    <rect x="-120" y="-100" width="240" height="200" rx="20" fill="none" stroke="url(#accent)" stroke-width="12"/>
    <!-- Mountain -->
    <polygon points="-80,60 -20,-20 40,60" fill="none" stroke="#4a9eff" stroke-width="8" stroke-linejoin="round"/>
    <polygon points="0,60 40,10 80,60" fill="none" stroke="#a855f7" stroke-width="8" stroke-linejoin="round"/>
    <!-- Sun -->
    <circle cx="60" cy="-50" r="24" fill="none" stroke="#4a9eff" stroke-width="8"/>
    <!-- Sparkle -->
    <g transform="translate(130,-110)" stroke="#a855f7" stroke-width="6" stroke-linecap="round">
      <line x1="0" y1="-16" x2="0" y2="16"/>
      <line x1="-16" y1="0" x2="16" y2="0"/>
      <line x1="-11" y1="-11" x2="11" y2="11"/>
      <line x1="11" y1="-11" x2="-11" y2="11"/>
    </g>
  </g>
</svg>
